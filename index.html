<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="container">

        <header id="header">
            <h2>Your Wishlist</h2>
            <img src="wishlist.webp" alt="wishlist icon" height="60">
        </header>

        <div id="form-wrapper">
            <form>
                <input type="text" id = "input" placeholder="Add an item..." >
                <button type="submit" id = "button">Add</button>
            </form>

            <!-- Todo Container -->
            <div id="todo-container">
                
            </div>

        </div>

    </div>
</body>
<script src="script.js"></script>
</html>
